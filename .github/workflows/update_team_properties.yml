name: Update Teams Property Descriptions

on:
  workflow_dispatch:
    inputs:
      spreadsheet_id:
        description: "Google Sheet ID (leave blank to use the repo secret)"
        required: false
        default: ""
      sheet_name:
        description: "Tab name inside the sheet (leave blank for first tab)"
        required: false
        default: ""
      dry_run:
        description: "Dry run – print properties without updating HubSpot"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  update-properties:
    name: Update HubSpot Teams property descriptions
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: teams-property-updater

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: teams-property-updater/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update Teams property descriptions
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          HUBSPOT_TEAMS_OBJECT_TYPE: ${{ secrets.HUBSPOT_TEAMS_OBJECT_TYPE }}
          TEAMS_SPREADSHEET_ID: ${{ inputs.spreadsheet_id || secrets.TEAMS_SPREADSHEET_ID }}
          TEAMS_SHEET_NAME: ${{ inputs.sheet_name }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: python update_team_properties.py
